name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Go test and vet
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.6-alpine
        env:
          CLICKHOUSE_DB: collector
          CLICKHOUSE_USER: collector
          CLICKHOUSE_PASSWORD: ci-clickhouse-password
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --user collector --password ci-clickhouse-password --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      CLICKHOUSE_TEST_ADDR: 127.0.0.1:9000
      CLICKHOUSE_TEST_USER: collector
      CLICKHOUSE_TEST_PASSWORD: ci-clickhouse-password
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -p 1 ./...
      - run: go vet ./...

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  container:
    name: Container and Portainer stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: collector:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker compose --env-file .env.example -f deploy/compose.yml config --quiet
